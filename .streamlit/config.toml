# Tema claro, cálido y limpio (crema suave que no cansa la vista).
[theme]
base = "light"
primaryColor = "#0F7A5A"
backgroundColor = "#FBF9F5"           # crema suave (fondo)
secondaryBackgroundColor = "#FFFFFF"  # blanco para tarjetas y barra lateral
textColor = "#2A2E35"                 # gris oscuro (no negro puro)
font = "sans serif"

[server]
headless = true
# PUERTO FIJO: el Radar SIEMPRE vive en http://localhost:8501. Nunca cambia.
port = 8501
# Recarga solo cuando cambia el código: NO hay que matar ni reabrir el servidor.
# El servidor se queda arriba; los cambios entran solos al guardar el archivo.
runOnSave = true

[browser]
gatherUsageStats = false
